<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL - Engineering Faculty LMS</title>
    
    <!-- Pustaka Eksternal -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        // Konfigurasi palet warna pastel yang adem
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            50: '#f0f9ff',  
                            100: '#e0f2fe', 
                            200: '#bae6fd', 
                            300: '#7dd3fc', 
                            700: '#0369a1', 
                            800: '#075985'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #334155;
            font-size: 13px;
        }

        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .lucide { 
            display: inline-block;
            vertical-align: middle;
        }

        .bar-bg { background-color: #f1f5f9; border-radius: 99px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 99px; transition: width 1s ease-in-out; }
        
        .editor-content {
            min-height: 120px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            outline: none;
        }
        @media (min-width: 768px) {
            .editor-content { min-height: 180px; }
        }
        .editor-content:focus { border-color: #7dd3fc; }
        .editor-content b { font-weight: bold; }
        .editor-content i { font-style: italic; }
        .editor-content ul { list-style-type: disc; padding-left: 20px; }

        .custom-audio { width: 100%; height: 32px; border-radius: 8px; }
        .skill-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- 1. KOMPONEN IKON RESMI ---
        function Icon({ name, size = 16, className = "" }) {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    spanRef.current.innerHTML = `<i data-lucide="${kebabName}" class="${className}"></i>`;
                    window.lucide.createIcons({
                        root: spanRef.current,
                        attrs: { width: size, height: size }
                    });
                }
            }, [name, size, className]);

            return <span ref={spanRef} style={{ display: 'inline-flex', verticalAlign: 'middle' }}></span>;
        }

        // --- 2. CONFIG SUPABASE ---
        const SUPABASE_URL = 'https://idewsrikbjycimglommp.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkZXdzcmlrYmp5Y2ltZ2xvbW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MTY2MTQsImV4cCI6MjA4NzI5MjYxNH0.jqrpte8vF_0eILRrMIsRC3zjCCZIDXqrDzdpVt4YMVk';
        
        // Konfigurasi tambahan untuk menangani fetch error di environment Iframe/Canvas
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: false
            },
            global: {
                fetch: (...args) => {
                    return fetch(...args).catch(err => {
                        console.warn('Supabase fetch error digagalkan secara aman:', err);
                        // Mengembalikan response kosong tiruan untuk menghindari rentetan unhandled promise rejection
                        return new Response(JSON.stringify({ error: "Network Error" }), { status: 502, statusText: "Bad Gateway" });
                    });
                }
            }
        });

        const sharedStyles = {
            btnPrimary: "bg-pastel-200 hover:bg-pastel-300 text-pastel-700 px-4 py-2 rounded-lg font-bold transition-all flex items-center justify-center gap-2 shadow-sm active:scale-95 disabled:opacity-50",
            input: "w-full p-2.5 bg-white border border-slate-200 rounded-lg outline-none focus:border-pastel-300 transition-all font-sans",
            label: "block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1",
        };

        // --- 3. EDITOR & MODALS ---
        function RichTextEditor({ value, onChange }) {
            const editorRef = useRef(null);
            useEffect(() => { if (editorRef.current && editorRef.current.innerHTML !== value) editorRef.current.innerHTML = value || ''; }, [value]);
            const execCommand = (cmd) => { document.execCommand(cmd, false, null); onChange(editorRef.current.innerHTML); };
            return (
                <div className="space-y-1 font-sans">
                    <div className="flex gap-1 p-1 bg-slate-100 rounded-t-lg border border-slate-200 sticky top-0 z-10 font-sans">
                        <button type="button" onClick={() => execCommand('bold')} className="p-1.5 hover:bg-white rounded"><Icon name="Bold" size={14}/></button>
                        <button type="button" onClick={() => execCommand('italic')} className="p-1.5 hover:bg-white rounded"><Icon name="Italic" size={14}/></button>
                        <button type="button" onClick={() => execCommand('insertUnorderedList')} className="p-1.5 hover:bg-white rounded"><Icon name="List" size={14}/></button>
                    </div>
                    <div ref={editorRef} contentEditable onInput={() => onChange(editorRef.current.innerHTML)} className="editor-content no-scrollbar prose prose-sm max-w-none text-slate-600 font-sans"></div>
                </div>
            );
        }

        function DeleteConfirmModal({ isOpen, onClose, onConfirm, loading, title = "Hapus Data?" }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/30 backdrop-blur-sm animate-in font-sans">
                    <div className="bg-white rounded-xl w-full max-w-sm p-8 shadow-2xl text-center border">
                        <div className="w-10 h-10 bg-red-50 text-red-500 rounded-lg flex items-center justify-center mx-auto mb-4 font-sans"><Icon name="AlertTriangle" size={24} /></div>
                        <h3 className="text-base font-bold text-slate-800 mb-1 font-sans">{title}</h3>
                        <p className="text-slate-500 text-xs mb-6 font-sans">Tindakan ini tidak dapat dibatalkan.</p>
                        <div className="flex gap-3 mt-6 font-sans">
                            <button onClick={onClose} className="flex-1 px-4 py-2 border rounded-lg font-bold text-slate-400 hover:bg-slate-50 transition-all font-sans">Batal</button>
                            <button onClick={onConfirm} disabled={loading} className="flex-1 px-4 py-2 bg-red-500 text-white rounded-lg font-bold hover:bg-red-600 transition-all font-sans">{loading ? '...' : 'Hapus'}</button>
                        </div>
                    </div>
                </div>
            );
        }

        function StudentEditModal({ isOpen, onClose, onRefresh, student }) {
            const [loading, setLoading] = useState(false);
            const [fullName, setFullName] = useState('');
            const [username, setUsername] = useState('');
            useEffect(() => { if (student) { setFullName(student.full_name || ''); setUsername(student.username || ''); } }, [student, isOpen]);
            const handleSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                try {
                    await supabaseClient.from('profiles').update({ full_name: fullName, username: username.toLowerCase().trim() }).eq('id', student.id);
                    onRefresh(); onClose();
                } catch (err) { alert(err.message); } finally { setLoading(false); }
            };
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in font-sans">
                    <div className="bg-white rounded-xl w-full max-w-md shadow-xl border overflow-hidden">
                        <div className="px-6 py-4 border-b flex justify-between items-center bg-pastel-50 font-sans"><h2 className="text-xs font-bold text-pastel-700 uppercase tracking-widest font-sans">Edit Profil</h2><button onClick={onClose}><Icon name="X" size={16}/></button></div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-4 text-left font-sans">
                            <div><label className={sharedStyles.label}>NAMA LENGKAP</label><input type="text" required className={sharedStyles.input} value={fullName} onChange={(e) => setFullName(e.target.value)} /></div>
                            <div><label className={sharedStyles.label}>ID USERNAME</label><input type="text" required className={sharedStyles.input} value={username} onChange={(e) => setUsername(e.target.value)} /></div>
                            <button type="submit" disabled={loading} className={sharedStyles.buttonPrimary + " w-full mt-4 uppercase text-xs"}>Simpan Perubahan</button>
                        </form>
                    </div>
                </div>
            );
        }

        function GradeModal({ isOpen, onClose, onRefresh, grade, students }) {
            const [loading, setLoading] = useState(false);
            const [score, setScore] = useState(0);
            const [meeting, setMeeting] = useState(1);
            const [studentId, setStudentId] = useState('');
            useEffect(() => { if (grade) { setScore(grade.score); setMeeting(grade.meeting_number); setStudentId(grade.student_id); } else { setScore(0); setMeeting(1); setStudentId(students[0]?.id || ''); } }, [grade, isOpen, students]);
            const handleSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                try {
                    if (grade && !grade.is_practice) await supabaseClient.from('grades').update({ score, meeting_number: meeting }).eq('id', grade.id);
                    else await supabaseClient.from('grades').insert([{ student_id: studentId, score, meeting_number: meeting }]);
                    onRefresh(); onClose();
                } catch (err) { alert(err.message); } finally { setLoading(false); }
            };
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/30 backdrop-blur-sm animate-in font-sans">
                    <div className="bg-white rounded-xl w-full max-w-md shadow-xl p-6 border font-sans">
                        <div className="flex justify-between items-center mb-6 font-bold text-xs uppercase tracking-widest text-slate-700 font-sans"><h2>Input Nilai Manual</h2><button onClick={onClose}><Icon name="X" /></button></div>
                        <form onSubmit={handleSubmit} className="space-y-4 text-left font-sans">
                            {(!grade || grade.is_practice) && (<div><label className={sharedStyles.label}>MAHASISWA</label><select className={sharedStyles.input} value={studentId} onChange={(e) => setStudentId(e.target.value)}>{students.map(s => <option key={s.id} value={s.id}>{s.full_name}</option>)}</select></div>)}
                            <div><label className={sharedStyles.label}>PERTEMUAN</label><select className={sharedStyles.input} value={meeting} onChange={(e) => setMeeting(parseInt(e.target.value))}>{[...Array(16)].map((_, i) => (<option key={i+1} value={i+1}>P{i+1}</option>))}</select></div>
                            <div><label className={sharedStyles.label}>SKOR TOEFL (MANUAL)</label><input type="number" required className={sharedStyles.input} value={score} onChange={(e) => setScore(parseFloat(e.target.value))} /></div>
                            <button type="submit" disabled={loading} className="w-full bg-pastel-700 text-white py-2.5 rounded-lg font-bold text-xs mt-2 uppercase font-sans">Simpan</button>
                        </form>
                    </div>
                </div>
            );
        }

        function MaterialModal({ isOpen, onClose, onRefresh, material }) {
            const [loading, setLoading] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [formData, setFormData] = useState({ title: '', description: '', meeting_number: 1, image_url: '', audio_url: '' });

            useEffect(() => {
                if (material) setFormData({ ...material });
                else setFormData({ title: '', description: '', meeting_number: 1, image_url: '', audio_url: '' });
            }, [material, isOpen]);

            const handleUpload = async (file, type) => {
                if (!file) return;
                setUploading(true);
                const isAudio = type === 'audio';
                try {
                    const bucket = isAudio ? 'audios' : 'images';
                    const folder = isAudio ? 'audio-files' : 'uploads';
                    const fileName = `mat-${type}-${Date.now()}.${file.name.split('.').pop()}`;
                    const { data, error } = await supabaseClient.storage.from(bucket).upload(`${folder}/${fileName}`, file);
                    if (error) throw error;
                    const { data: { publicUrl } } = supabaseClient.storage.from(bucket).getPublicUrl(`${folder}/${fileName}`);
                    setFormData(prev => ({ ...prev, [isAudio ? 'audio_url' : 'image_url']: publicUrl }));
                } catch (err) { alert("Upload gagal: " + err.message); } finally { setUploading(false); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                try {
                    if (material) await supabaseClient.from('materials').update(formData).eq('id', material.id);
                    else await supabaseClient.from('materials').insert([formData]);
                    onRefresh(); onClose();
                } catch (err) { alert(err.message); } finally { setLoading(false); }
            };

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-end md:items-center justify-center p-0 md:p-4 bg-slate-900/30 backdrop-blur-sm animate-in font-sans">
                    <div className="bg-white rounded-t-3xl md:rounded-2xl w-full md:max-w-2xl max-h-[95vh] flex flex-col shadow-2xl border overflow-hidden">
                        <div className="px-6 py-4 border-b flex justify-between items-center sticky top-0 bg-white z-20 font-sans font-sans">
                            <h2 className="font-bold text-xs uppercase tracking-widest text-pastel-700">Formulir Materi</h2>
                            <button onClick={onClose} className="p-2 hover:bg-slate-50 rounded-full"><Icon name="X" /></button>
                        </div>
                        <form onSubmit={handleSubmit} className="flex-1 overflow-y-auto no-scrollbar p-6 space-y-6 font-sans">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 font-sans">
                                <div><label className={sharedStyles.label}>PERTEMUAN</label><select className={sharedStyles.input} value={formData.meeting_number} onChange={(e) => setFormData({...formData, meeting_number: parseInt(e.target.value)})}>{[...Array(16)].map((_, i) => <option key={i+1} value={i+1}>P{i+1}</option>)}</select></div>
                                <div className="md:col-span-2"><label className={sharedStyles.label}>JUDUL MATERI</label><input type="text" required className={sharedStyles.input} placeholder="Nama Materi..." value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} /></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 border p-4 rounded-xl bg-slate-50 font-sans">
                                <div className="space-y-2 font-sans"><label className={sharedStyles.label}>Gambar Materi</label><input type="file" className="text-[10px] w-full" onChange={(e) => handleUpload(e.target.files[0], 'image')} />{formData.image_url && <div className="text-[10px] text-green-600 font-bold flex items-center gap-1 font-sans font-sans"><Icon name="Check" size={12}/> Gambar Siap</div>}</div>
                                <div className="space-y-2 font-sans"><label className={sharedStyles.label}>Audio Penjelasan</label><input type="file" accept="audio/*" className="text-[10px] w-full" onChange={(e) => handleUpload(e.target.files[0], 'audio')} />{formData.audio_url && <div className="text-[10px] text-green-600 font-bold flex items-center gap-1 font-sans"><Icon name="Check" size={12}/> Audio Siap</div>}</div>
                            </div>
                            <div className="font-sans">
                                <label className={sharedStyles.label}>ISI MATERI</label>
                                <RichTextEditor value={formData.description} onChange={(val) => setFormData({...formData, description: val})} />
                            </div>
                        </form>
                        <div className="p-6 bg-slate-50 border-t flex gap-3 font-sans">
                            <button onClick={handleSubmit} disabled={loading || uploading} className="w-full bg-pastel-700 text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest shadow-lg font-sans">Simpan Materi</button>
                        </div>
                    </div>
                </div>
            );
        }

        // Komponen Modal Tambah/Edit Soal
        function QuestionModal({ isOpen, onClose, onRefresh, editingQuestion, nextOrder, questions = [] }) {
            const [loading, setLoading] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [formData, setFormData] = useState({ skill: 'reading', question_text: '', passage_text: '', option_a: '', option_b: '', option_c: '', option_d: '', correct_answer: 'a', order_index: 0, meeting_number: 1, image_url: '', audio_url: '' });
            
            useEffect(() => { 
                if (editingQuestion) setFormData({ ...editingQuestion }); 
                else setFormData(p => ({ ...p, order_index: nextOrder || 0, image_url: '', audio_url: '', passage_text: '' })); 
            }, [editingQuestion, isOpen, nextOrder]);
            
            const handleUpload = async (file, type) => {
                if (!file) return; setUploading(true); const isAudio = type === 'audio';
                try {
                    const bucket = isAudio ? 'audios' : 'images';
                    const folder = isAudio ? 'audio-files' : 'uploads';
                    const fileName = `${type}-${Date.now()}.${file.name.split('.').pop()}`;
                    const { data, error } = await supabaseClient.storage.from(bucket).upload(`${folder}/${fileName}`, file);
                    if (error) throw error;
                    const { data: { publicUrl } } = supabaseClient.storage.from(bucket).getPublicUrl(`${folder}/${fileName}`);
                    setFormData(prev => ({ ...prev, [isAudio ? 'audio_url' : 'image_url']: publicUrl }));
                } catch (err) { alert(err.message); } finally { setUploading(false); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                try { 
                    if (editingQuestion) await supabaseClient.from('questions').update(formData).eq('id', editingQuestion.id); 
                    else await supabaseClient.from('questions').insert([formData]); 
                    onRefresh(); onClose(); 
                } catch (err) { alert(err.message); } finally { setLoading(false); }
            };

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-end md:items-center justify-center p-0 md:p-4 bg-slate-900/30 backdrop-blur-sm animate-in font-sans">
                    <div className="bg-white rounded-t-3xl md:rounded-2xl w-full md:max-w-2xl max-h-[95vh] flex flex-col shadow-2xl border overflow-hidden font-sans font-sans">
                        <div className="px-6 py-4 border-b flex justify-between items-center bg-white z-20"><h2 className="font-bold text-xs uppercase tracking-widest text-pastel-700 font-sans">Kelola Soal</h2><button type="button" onClick={onClose}><Icon name="X" /></button></div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-4 text-left overflow-y-auto no-scrollbar font-sans font-sans font-sans">
                            {/* Alat Bantu Salin Konteks */}
                            {!editingQuestion && questions.length > 0 && (
                                <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg mb-4">
                                    <label className={sharedStyles.label}>Gunakan Konteks Dari Soal Sebelumnya (Opsional)</label>
                                    <select className={sharedStyles.input + " text-xs"} onChange={(e) => {
                                        const q = questions.find(x => x.id === e.target.value);
                                        if (q) setFormData({ ...formData, passage_text: q.passage_text || '', image_url: q.image_url || '', audio_url: q.audio_url || '' });
                                    }}>
                                        <option value="">-- Tidak Menyalin / Buat Baru --</option>
                                        {questions.filter(q => q.meeting_number === formData.meeting_number && (q.passage_text || q.image_url || q.audio_url)).map(q => (
                                            <option key={q.id} value={q.id}>Soal: {q.question_text.substring(0, 50)}...</option>
                                        ))}
                                    </select>
                                    <p className="text-[10px] text-slate-400 mt-1 italic">Berguna jika soal ini mengacu pada reading text / audio yang sama dengan soal lain.</p>
                                </div>
                            )}

                            <div className="grid grid-cols-2 gap-4 font-sans font-sans font-sans">
                                <div><label className={sharedStyles.label}>PERTEMUAN</label><select className={sharedStyles.input} value={formData.meeting_number} onChange={(e) => setFormData({...formData, meeting_number: parseInt(e.target.value)})}>{[...Array(16)].map((_, i) => <option key={i+1} value={i+1}>P{i+1}</option>)}</select></div>
                                <div><label className={sharedStyles.label}>KATEGORI</label><select className={sharedStyles.input} value={formData.skill} onChange={(e) => setFormData({...formData, skill: e.target.value})}><option value="reading">Reading</option><option value="structure">Structure</option><option value="listening">Listening</option></select></div>
                            </div>

                            <div className="border border-slate-200 p-4 rounded-xl bg-slate-50 space-y-4">
                                <div>
                                    <label className={sharedStyles.label}>TEKS BACAAN / KONTEKS (Opsional)</label>
                                    <RichTextEditor value={formData.passage_text} onChange={(val) => setFormData({...formData, passage_text: val})} />
                                </div>
                                <div className="grid grid-cols-2 gap-4 text-[10px] font-sans font-sans font-sans">
                                    <div className="space-y-1 font-sans"><label className={sharedStyles.label}>Gambar Konteks</label><input type="file" className="block w-full font-sans font-sans" onChange={(e) => handleUpload(e.target.files[0], 'image')} />{formData.image_url && <span className="text-green-600 font-bold font-sans">Siap ({formData.image_url.split('/').pop().substring(0,10)}...)</span>}</div>
                                    <div className="space-y-1 font-sans font-sans"><label className={sharedStyles.label}>Audio Konteks (.mp3)</label><input type="file" accept="audio/*" className="block w-full font-sans" onChange={(e) => handleUpload(e.target.files[0], 'audio')} />{formData.audio_url && <span className="text-green-600 font-bold font-sans">Siap ({formData.audio_url.split('/').pop().substring(0,10)}...)</span>}</div>
                                </div>
                            </div>

                            <div><label className={sharedStyles.label}>PERTANYAAN UTAMA</label><textarea required className={sharedStyles.input} value={formData.question_text} onChange={(e) => setFormData({...formData, question_text: e.target.value})} /></div>
                            <div className="grid grid-cols-2 gap-2 font-sans">{['a', 'b', 'c', 'd'].map(o => (<div key={o}><input required className={sharedStyles.input + " text-xs font-sans"} placeholder={`Opsi ${o.toUpperCase()}`} value={formData[`option_${o}`]} onChange={(e) => setFormData({...formData, [`option_${o}`]: e.target.value})} /></div>))}</div>
                            <div>
                                <label className={sharedStyles.label}>KUNCI JAWABAN</label>
                                <select className={sharedStyles.input} value={formData.correct_answer} onChange={(e) => setFormData({...formData, correct_answer: e.target.value})}>
                                    <option value="a">A</option><option value="b">B</option><option value="c">C</option><option value="d">D</option>
                                </select>
                            </div>
                            <button type="submit" disabled={loading || uploading} className="w-full bg-pastel-700 text-white py-3 rounded-lg font-bold mt-4 uppercase text-xs font-sans">Simpan Soal</button>
                        </form>
                    </div>
                </div>
            );
        }

        function ImportQuestionsModal({ isOpen, onClose, onRefresh }) {
            const [loading, setLoading] = useState(false);
            const [jsonText, setJsonText] = useState('');
            const [errorMsg, setErrorMsg] = useState('');

            const handleImport = async (e) => {
                e.preventDefault();
                if (!jsonText.trim()) {
                    setErrorMsg("Teks JSON tidak boleh kosong.");
                    return;
                }
                
                setLoading(true);
                setErrorMsg('');

                try {
                    let parsedData;
                    try {
                        parsedData = JSON.parse(jsonText);
                    } catch (parseErr) {
                        throw new Error("Format JSON tidak valid. Pastikan penulisan kutip (\") dan koma (,) sudah benar. Error detail: " + parseErr.message);
                    }

                    if (!Array.isArray(parsedData)) {
                        if (typeof parsedData === 'object' && parsedData !== null) {
                            parsedData = [parsedData];
                        } else {
                            throw new Error("Format tidak valid. Harus berupa Array [ {..} ] atau Objek {..}");
                        }
                    }

                    const formattedData = parsedData.map((item, index) => {
                        return {
                            meeting_number: parseInt(item.meeting_number || item.pertemuan || 1),
                            skill: String(item.skill || item.kategori || 'reading').toLowerCase(),
                            question_text: String(item.question_text || item.pertanyaan || ''),
                            passage_text: item.passage_text || item.teks_bacaan || item.konteks ? String(item.passage_text || item.teks_bacaan || item.konteks) : null,
                            option_a: String(item.option_a || item.opsi_a || ''),
                            option_b: String(item.option_b || item.opsi_b || ''),
                            option_c: String(item.option_c || item.opsi_c || ''),
                            option_d: String(item.option_d || item.opsi_d || ''),
                            correct_answer: String(item.correct_answer || item.kunci_jawaban || 'a').toLowerCase().trim(),
                            explanation: String(item.explanation || item.penjelasan || ''),
                            image_url: item.image_url || item.url_gambar || null,
                            audio_url: item.audio_url || item.url_audio || null,
                            order_index: item.order_index || index
                        };
                    });

                    const validData = formattedData.filter(d => d.question_text && d.option_a && d.option_b);

                    if (validData.length === 0) {
                        throw new Error("Tidak ada data soal yang valid ditemukan. Pastikan ada 'pertanyaan', 'opsi_a', dan 'opsi_b'.");
                    }

                    const { error } = await supabaseClient.from('questions').insert(validData);
                    if (error) throw error;

                    alert(`Berhasil mengimpor ${validData.length} soal!`);
                    setJsonText(''); 
                    if (onRefresh) onRefresh();
                    onClose();
                } catch (err) {
                    setErrorMsg(err.message);
                } finally {
                    setLoading(false);
                }
            };

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/30 backdrop-blur-sm animate-in font-sans">
                    <div className="bg-white rounded-xl w-full max-w-2xl shadow-xl border font-sans flex flex-col max-h-[90vh]">
                        <div className="px-6 py-4 border-b flex justify-between items-center font-bold text-xs uppercase tracking-widest text-slate-700 font-sans sticky top-0 bg-white z-10 rounded-t-xl">
                            <h2>Import JSON (Copy-Paste)</h2>
                            <button type="button" onClick={onClose} className="p-1 hover:bg-slate-100 rounded"><Icon name="X" /></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto flex-1">
                            <div className="mb-4 bg-sky-50 p-4 rounded-xl border border-sky-100 text-xs text-sky-800 leading-relaxed">
                                <p className="font-bold mb-2 flex items-center gap-2"><Icon name="Info" size={14}/> Format JSON yang benar:</p>
                                <pre className="bg-white p-3 rounded-lg border border-sky-200 overflow-x-auto text-[10px] font-mono text-slate-600">
{`[
  {
    "pertemuan": 1,
    "kategori": "listening",
    "url_audio": "https://link-ke-audio-anda.com/file.mp3",
    "url_gambar": "https://link-ke-gambar-anda.com/gambar.jpg",
    "pertanyaan": "What does the man mean?",
    "opsi_a": "Jawaban A",
    "opsi_b": "Jawaban B",
    "opsi_c": "Jawaban C",
    "opsi_d": "Jawaban D",
    "kunci_jawaban": "a"
  }
]`}
                                </pre>
                            </div>

                            {errorMsg && (
                                <div className="mb-4 bg-red-50 p-3 rounded-lg border border-red-200 text-xs text-red-600 font-medium flex items-start gap-2">
                                    <Icon name="AlertCircle" size={16} className="shrink-0 mt-0.5"/>
                                    <span>{errorMsg}</span>
                                </div>
                            )}

                            <form onSubmit={handleImport} className="space-y-4 text-left font-sans flex flex-col h-full">
                                <div className="flex-1 flex flex-col">
                                    <label className={sharedStyles.label}>PASTE DATA JSON DI SINI</label>
                                    <textarea 
                                        required 
                                        className={sharedStyles.input + " text-xs font-mono h-64 resize-y"} 
                                        placeholder="[ { ... }, { ... } ]"
                                        value={jsonText} 
                                        onChange={(e) => setJsonText(e.target.value)} 
                                        spellCheck="false"
                                    />
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-pastel-700 hover:bg-pastel-800 transition-colors text-white py-3 rounded-xl font-bold text-xs uppercase flex justify-center items-center gap-2 font-sans shadow-sm mt-4">
                                    {loading ? 'Memproses...' : <><Icon name="Copy" size={16}/> Proses & Simpan Soal</>}
                                </button>
                            </form>
                        </div>
                    </div>

            );
        }

        function PracticeEngine({ questions, user, onFinish }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            
            // Hitung Total Waktu (Global Timer) untuk satu sesi latihan
            useEffect(() => {
                if (questions && questions.length > 0 && timeLeft === null) {
                    const totalSeconds = questions.reduce((acc, q) => {
                        if (q.skill === 'structure') return acc + 38; // 37.5 detik dibulatkan
                        if (q.skill === 'reading') return acc + 66; // 1.1 menit
                        return acc + 40; // Default buffer untuk listening
                    }, 0);
                    setTimeLeft(totalSeconds);
                }
            }, [questions, timeLeft]);

            // Logika Hitung Mundur Global
            useEffect(() => {
                if (timeLeft === null || timeLeft <= 0) return;
                
                const interval = setInterval(() => {
                    setTimeLeft(prev => prev - 1);
                }, 1000);
                
                return () => clearInterval(interval);
            }, [timeLeft]);

            // Format Timer MM:SS
            const formatTime = (seconds) => {
                if (seconds === null) return "--:--";
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            // Pemicu Waktu Habis Global
            useEffect(() => {
                if (timeLeft === 0) {
                    alert("Waktu Habis! Latihan Anda otomatis diselesaikan.");
                    onFinish();
                }
            }, [timeLeft, onFinish]);

            const currentQuestion = questions[currentIndex];

            const handleAnswer = async (o) => { 
                if (isSubmitting) return;
                setIsSubmitting(true);
                
                try {
                    await supabaseClient.from('attempts').insert([{ 
                        user_id: user.id, 
                        question_id: currentQuestion.id, 
                        selected_answer: o, 
                        is_correct: o === currentQuestion.correct_answer, 
                        skill: currentQuestion.skill 
                    }]); 
                    
                    if (currentIndex < questions.length - 1) {
                        setCurrentIndex(prev => prev + 1);
                    } else {
                        alert("Latihan Selesai! Semua jawaban telah direkam ke dalam sistem.");
                        onFinish();
                    }
                } catch (err) {
                    console.error(err);
                    // Lanjutkan saja meskipun gagal nyimpan agar mahasiswa tidak tersendat
                    if (currentIndex < questions.length - 1) {
                        setCurrentIndex(prev => prev + 1);
                    } else {
                        onFinish();
                    }
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (questions && questions.length === 0) {
                return (
                    <div className="p-12 text-center bg-white rounded-xl border shadow-sm animate-fade-in max-w-md mx-auto mt-20 font-sans">
                        <div className="mb-4 text-slate-300 flex justify-center"><Icon name="Inbox" size={48}/></div>
                        <h3 className="text-xl font-bold mb-2 text-slate-800">Belum Ada Soal</h3>
                        <p className="text-sm text-slate-500 mb-6">Soal untuk pertemuan ini belum tersedia.</p>
                        <button onClick={onFinish} className="w-full bg-pastel-700 text-white py-3 rounded-lg font-bold uppercase tracking-widest text-xs shadow-sm">Kembali ke Beranda</button>
                    </div>
                );
            }

            if (!currentQuestion) return null;

            const isSplitLayout = !!currentQuestion.passage_text;

            const QuestionContent = () => (
                <div className="bg-white p-8 rounded-xl border border-slate-200 shadow-sm text-left w-full relative">
                    {/* Header Modul & Global Timer */}
                    <div className="flex justify-between items-center mb-6 text-[10px] font-bold uppercase text-slate-400 font-sans">
                        <div className="flex items-center gap-3">
                            <span className="px-3 py-1.5 bg-slate-100 rounded-md text-slate-600 tracking-widest">Bagian: {currentQuestion.skill}</span>
                            <span className={`px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors font-black tracking-widest shadow-sm border ${timeLeft <= 60 ? 'bg-red-50 text-red-600 border-red-200 animate-pulse' : 'bg-white text-pastel-700 border-slate-200'}`}>
                                <Icon name="Timer" size={14}/> Sisa Waktu: {formatTime(timeLeft)}
                            </span>
                        </div>
                        <span className="bg-slate-50 px-3 py-1.5 rounded-md border border-slate-100">Soal {currentIndex + 1} / {questions.length}</span>
                    </div>
                    
                    {!isSplitLayout && currentQuestion.audio_url && (
                        <div className="bg-sky-50 p-6 rounded-2xl mb-6 border border-sky-100 flex items-center gap-4 animate-in font-sans font-sans font-sans">
                            <div className="w-10 h-10 bg-pastel-200 text-pastel-700 rounded-full flex items-center justify-center animate-pulse font-sans"><Icon name="Volume2" size={20}/></div>
                            <div className="flex-1 font-sans">
                                <p className="text-[10px] font-black uppercase text-pastel-700 mb-1 tracking-widest font-sans">Listening Audio</p>
                                <audio key={currentQuestion.audio_url} autoPlay controls className="custom-audio shadow-sm font-sans font-sans">
                                    <source src={currentQuestion.audio_url} type="audio/mpeg" />
                                </audio>
                            </div>
                        </div>
                    )}
                    {!isSplitLayout && currentQuestion.image_url && (
                        <div className="mb-6 bg-white p-4 rounded-xl border border-slate-200 flex justify-center shadow-sm font-sans font-sans font-sans font-sans">
                            <img src={currentQuestion.image_url} className="max-h-64 object-contain font-sans" />
                        </div>
                    )}

                    <p className="text-base font-bold text-slate-800 mb-8 leading-relaxed font-sans font-sans font-sans font-sans font-sans">{currentQuestion.question_text}</p>
                    
                    <div className="space-y-3 font-sans font-sans">
                        {['a', 'b', 'c', 'd'].map(key => (
                            <button 
                                key={key} 
                                disabled={isSubmitting} 
                                onClick={() => handleAnswer(key)} 
                                className={`w-full p-4 text-left border rounded-lg flex items-center gap-3 transition-all font-sans hover:border-pastel-300 hover:bg-pastel-50 border-slate-200 ${isSubmitting ? 'opacity-50 cursor-not-allowed' : ''}`}
                            >
                                <div className="w-6 h-6 rounded flex items-center justify-center text-[10px] font-bold font-sans bg-slate-100 text-slate-400 font-sans">
                                    {key.toUpperCase()}
                                </div>
                                <span className="text-sm font-sans text-slate-600 font-medium">{currentQuestion[`option_${key}`]}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );

            if (isSplitLayout) {
                return (
                    <div className="max-w-6xl mx-auto py-8 px-4 animate-in font-sans">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                            {/* Kiri: Teks Bacaan / Media Konteks */}
                            <div className="bg-white p-8 rounded-xl border border-slate-200 shadow-sm sticky top-20 overflow-y-auto max-h-[80vh] font-sans">
                                <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-6 flex items-center gap-2">
                                    <Icon name="BookOpen" size={14}/> Reading Passage / Context
                                </h3>
                                {currentQuestion.audio_url && (
                                    <audio key={currentQuestion.audio_url} controls className="custom-audio shadow-sm w-full mb-6">
                                        <source src={currentQuestion.audio_url} type="audio/mpeg" />
                                    </audio>
                                )}
                                {currentQuestion.image_url && (
                                    <img src={currentQuestion.image_url} className="mb-6 rounded-lg w-full object-contain max-h-80" />
                                )}
                                <div className="prose prose-sm max-w-none text-slate-700 leading-relaxed text-sm text-justify" dangerouslySetInnerHTML={{ __html: currentQuestion.passage_text }}></div>
                            </div>
                            {/* Kanan: Soal */}
                            <QuestionContent />
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto py-8 px-4 animate-in font-sans font-sans font-sans">
                    <QuestionContent />
                </div>
            );
        }

        // --- 6. DASHBOARDS ---

        function LecturerDashboard({ questions, onRefresh, onRefreshQuestions }) {
            const [activeSubTab, setActiveSubTab] = useState('analytics');
            const [selectedMeeting, setSelectedMeeting] = useState(1);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [editingQuestion, setEditingQuestion] = useState(null);
            const [isStudentEditModalOpen, setIsStudentEditModalOpen] = useState(false);
            const [editingStudent, setEditingStudent] = useState(null);
            const [deleteStudentId, setDeleteStudentId] = useState(null);
            const [deleteQuestionId, setDeleteQuestionId] = useState(null);
            const [isGradeModalOpen, setIsGradeModalOpen] = useState(false);
            const [isMaterialModalOpen, setIsMaterialModalOpen] = useState(false);
            const [editingMaterial, setEditingMaterial] = useState(null);
            const [editingGrade, setEditingGrade] = useState(null);
            const [students, setStudents] = useState([]);
            const [grades, setGrades] = useState([]);
            const [allAttempts, setAllAttempts] = useState([]);
            const [materials, setMaterials] = useState([]);
            const [loading, setLoading] = useState(false);

            const fetchStudents = async () => { const { data } = await supabaseClient.from('profiles').select('*').eq('role', 'student').order('full_name', { ascending: true }); setStudents(data || []); };
            const fetchGrades = async () => { const { data } = await supabaseClient.from('grades').select(`*, profiles:student_id(full_name, username)`).eq('meeting_number', selectedMeeting); setGrades(data || []); };
            const fetchMaterials = async () => { const { data } = await supabaseClient.from('materials').select('*').eq('meeting_number', selectedMeeting); setMaterials(data || []); };
            const fetchAllAttempts = async () => { const { data } = await supabaseClient.from('attempts').select('*'); setAllAttempts(data || []); };

            useEffect(() => { if (activeSubTab === 'students' || activeSubTab === 'analytics') { fetchStudents(); fetchAllAttempts(); } if (activeSubTab === 'grades' || activeSubTab === 'analytics') fetchGrades(); if (activeSubTab === 'materials') fetchMaterials(); }, [activeSubTab, selectedMeeting]);

            const handleDeleteStudent = async () => { 
                if (!deleteStudentId) return; 
                setLoading(true); 
                try { 
                    await supabaseClient.from('attempts').delete().eq('user_id', deleteStudentId);
                    await supabaseClient.from('grades').delete().eq('student_id', deleteStudentId);

                    const { error } = await supabaseClient.from('profiles').delete().eq('id', deleteStudentId); 
                    if (error) throw error;

                    fetchStudents(); 
                    setDeleteStudentId(null); 
                } catch (err) {
                    alert("Gagal menghapus akun: " + err.message);
                } finally { 
                    setLoading(false); 
                } 
            };
            
            const handleDeleteQuestion = async () => { 
                if (!deleteQuestionId) return; 
                setLoading(true); 
                try { 
                    await supabaseClient.from('attempts').delete().eq('question_id', deleteQuestionId);
                    
                    const { error } = await supabaseClient.from('questions').delete().eq('id', deleteQuestionId); 
                    if (error) throw error;
                    
                    if (onRefreshQuestions) await onRefreshQuestions(); 
                    setDeleteQuestionId(null); 
                } catch (err) {
                    alert("Gagal menghapus soal: " + err.message);
                } finally { 
                    setLoading(false); 
                } 
            };

            const classAnalytics = useMemo(() => {
                if (allAttempts.length === 0) return null;
                const stats = { avgScore: 310, avgProgress: 0, perSkill: { listening: 0, structure: 0, reading: 0 }, weakest: 'None', strugglePercent: 0 };
                ['listening', 'structure', 'reading'].forEach(skill => { const sAtt = allAttempts.filter(a => a.skill === skill); if (sAtt.length > 0) stats.perSkill[skill] = Math.round((sAtt.filter(a => a.is_correct).length / sAtt.length) * 100); });
                const avgPercent = (stats.perSkill.listening + stats.perSkill.structure + stats.perSkill.reading) / 3;
                stats.avgScore = Math.round(310 + (avgPercent * 3.67));
                stats.avgProgress = Math.round((new Set(allAttempts.map(a => `${a.user_id}-${a.question_id}`)).size / (students.length * Math.max(1, questions.length))) * 100);
                stats.weakest = ['listening', 'structure', 'reading'].reduce((a, b) => stats.perSkill[a] < stats.perSkill[b] ? a : b);
                const strugCount = students.filter(s => { const sAtt = allAttempts.filter(a => a.user_id === s.id && a.skill === stats.weakest); return sAtt.length > 0 && (sAtt.filter(a => a.is_correct).length / sAtt.length) < 0.6; }).length;
                stats.strugglePercent = Math.round((strugCount / (students.length || 1)) * 100);
                return stats;
            }, [allAttempts, students, questions]);

            // MENGGABUNGKAN NILAI MANUAL DAN HASIL LATIHAN OTOMATIS
            const combinedGrades = useMemo(() => {
                const meetingQuestionIds = questions.filter(q => q.meeting_number === selectedMeeting).map(q => q.id);
                const meetingAttempts = allAttempts.filter(a => meetingQuestionIds.includes(a.question_id));

                return students.map(student => {
                    // Cari nilai manual
                    const manualGrade = grades.find(g => g.student_id === student.id);
                    
                    let practiceScore = null;
                    const studentAttempts = meetingAttempts.filter(a => a.user_id === student.id);
                    
                    // Hitung nilai otomatis jika ada riwayat latihan
                    if (studentAttempts.length > 0) {
                        const correctCount = studentAttempts.filter(a => a.is_correct).length;
                        practiceScore = Math.round((correctCount / studentAttempts.length) * 100);
                    }

                    return {
                        id: manualGrade ? manualGrade.id : `practice-${student.id}`,
                        student: student,
                        score: manualGrade ? manualGrade.score : practiceScore,
                        isManual: !!manualGrade,
                        hasScore: manualGrade || studentAttempts.length > 0
                    };
                }).filter(g => g.hasScore); // Hanya tampilkan mahasiswa yang punya nilai riil atau sudah latihan
            }, [students, grades, allAttempts, questions, selectedMeeting]);

            return (
                <div className="space-y-6 text-left animate-in font-sans">
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex gap-2 p-1 bg-slate-100 rounded-lg w-full md:w-auto font-sans">
                            {['analytics', 'grades', 'students', 'bank', 'materials'].map(tab => (
                                <button key={tab} onClick={() => setActiveSubTab(tab)} className={`flex-1 md:flex-none px-5 py-2 rounded-md text-[10px] font-bold uppercase transition-all font-sans font-sans ${activeSubTab === tab ? 'bg-white text-pastel-700 shadow-sm' : 'text-slate-400'}`}>
                                    {tab === 'bank' ? 'Soal' : tab === 'students' ? 'Mahasiswa' : tab === 'analytics' ? 'Dashboard' : tab === 'grades' ? 'Nilai' : 'Materi'}
                                </button>

                            {questions.filter(q => q.meeting_number === selectedMeeting).map(q => (

        function StudentDashboard({ user, questions, onStartExams }) {
            const [activeSubTab, setActiveSubTab] = useState('beranda');
            const [selectedMeeting, setSelectedMeeting] = useState(1);
            const [materials, setMaterials] = useState([]);
            const [studentGrades, setStudentGrades] = useState([]);
            const [attempts, setAttempts] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const load = async () => {
                    if (!user) return; setLoading(true);
                    const { data: m } = await supabaseClient.from('materials').select('*').eq('meeting_number', selectedMeeting); setMaterials(m || []);
                    const { data: g } = await supabaseClient.from('grades').select('*').eq('student_id', user.id); setStudentGrades(g || []);
                    const { data: att } = await supabaseClient.from('attempts').select('*').eq('user_id', user.id); setAttempts(att || []);
                    setLoading(false);
                };
                load();
            }, [selectedMeeting, user]);

            // Hitung Statistik Berdasarkan Latihan yang Selesai
            const stats = useMemo(() => {
                const res = { score: 310, progress: 0, weak: 'N/A', perSkill: { listening: 0, structure: 0, reading: 0 } };
                if (attempts.length === 0) return res;
                ['listening', 'structure', 'reading'].forEach(skill => { const sk = attempts.filter(a => a.skill === skill); if (sk.length > 0) res.perSkill[skill] = Math.round((sk.filter(a => a.is_correct).length / sk.length) * 100); });
                const avg = (res.perSkill.listening + res.perSkill.structure + res.perSkill.reading) / 3;
                res.score = Math.round(310 + (avg * 3.67));
                
                // Menghitung jumlah pertemuan yang telah diselesaikan (baik dari latihan maupun input nilai riil)
                const completedMeetings = new Set([
                    ...studentGrades.map(g => g.meeting_number),
                    ...attempts.map(a => {
                        const q = questions.find(q => q.id === a.question_id);
                        return q ? q.meeting_number : null;
                    }).filter(m => m !== null)
                ]);
                res.progress = Math.round((completedMeetings.size / 16) * 100);
                
                res.weak = ['listening', 'structure', 'reading'].reduce((a, b) => res.perSkill[a] < res.perSkill[b] ? a : b);
                return res;
            }, [attempts, studentGrades, questions]);

            // Rekap Laporan Nilai per Pertemuan
            const meetingResults = useMemo(() => {
                return [...Array(16)].map((_, i) => {
                    const meetingNum = i + 1;
                    const grade = studentGrades.find(g => g.meeting_number === meetingNum);
                    
                    // Tarik jawaban dari latihan pertemuan ini
                    const meetingQuestionIds = questions.filter(q => q.meeting_number === meetingNum).map(q => q.id);
                    const meetingAttempts = attempts.filter(a => meetingQuestionIds.includes(a.question_id));
                    
                    let practiceScore = null;
                    let errorSkill = "-";
                    
                    // Kalkulasi akurasi jika ada riwayat latihan
                    if (meetingAttempts.length > 0) {
                        const correctCount = meetingAttempts.filter(a => a.is_correct).length;
                        practiceScore = Math.round((correctCount / meetingAttempts.length) * 100);
                        
                        const skills = ['listening', 'structure', 'reading'];
                        let lowestAcc = 100;
                        skills.forEach(sk => {
                            const skAtts = meetingAttempts.filter(a => a.skill === sk);
                            if (skAtts.length > 0) {
                                const acc = (skAtts.filter(a => a.is_correct).length / skAtts.length) * 100;
                                if (acc <= lowestAcc) { lowestAcc = acc; errorSkill = sk; }
                            }
                        });
                    }

                    return {
                        num: meetingNum, 
                        score: grade ? grade.score : practiceScore, // Prioritaskan nilai manual dosen, fallback ke nilai latihan
                        isManualGrade: !!grade,
                        skill: meetingNum <= 5 ? "Structure" : meetingNum <= 10 ? "Listening" : "Reading",
                        error: practiceScore !== null ? `Kelemahan: ${errorSkill}` : "-"
                    };
                });
            }, [studentGrades, attempts, questions]);

            const isExam = selectedMeeting === 8 || selectedMeeting === 16;

            return (
                <div className="space-y-6 text-left animate-in font-sans font-sans">

                        </div>
                        {activeSubTab === 'beranda' && (
                            <div className="flex items-center gap-3">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest hidden md:inline">Pilih Pertemuan:</span>
                                <select className="bg-pastel-50 px-4 py-2 rounded-lg font-bold text-xs text-pastel-700 outline-none border-0 shadow-sm cursor-pointer" value={selectedMeeting} onChange={(e) => setSelectedMeeting(parseInt(e.target.value))}>
                                    {[...Array(16)].map((_, i) => <option key={i+1} value={i+1}>P-{i+1}</option>)}
                                </select>
                            </div>
                        )}
                    </div>

                    {activeSubTab === 'beranda' && (
                        <div className="space-y-6 animate-in">
                            {/* Kartu Analitik Rekap */}

                                <div className="bg-white p-5 rounded-xl border flex items-center gap-4 shadow-sm font-sans font-sans"><div className="w-10 h-10 bg-pastel-100 text-pastel-700 rounded-lg flex items-center justify-center font-sans font-sans"><Icon name="Trophy" size={20}/></div><div><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Predicted Score</p><p className="text-xl font-black text-pastel-700 leading-none">{stats.score}</p></div></div>
                                <div className="bg-white p-5 rounded-xl border flex items-center gap-4 shadow-sm font-sans">
                                    <div className="w-10 h-10 bg-amber-50 text-amber-600 rounded-lg flex items-center justify-center font-sans font-sans font-sans"><Icon name="Activity" size={20}/></div>
                                    <div><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-sans">Progress Semester</p><p className="text-xl font-black text-slate-700 leading-none font-sans font-sans">{stats.progress}%</p></div>
                                </div>
                                <div className="bg-white p-5 rounded-xl border flex items-center gap-4 shadow-sm font-sans font-sans font-sans">
                                    <div className="w-10 h-10 bg-red-50 text-red-500 rounded-lg flex items-center justify-center font-sans font-sans font-sans font-sans font-sans font-sans"><Icon name="AlertCircle" size={20}/></div>
                                    <div><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-sans font-sans">Weak Skill</p><p className="text-base font-bold text-red-600 capitalize leading-none font-sans font-sans font-sans">{stats.weak}</p></div>
                                </div>
                            </div>

                            {/* Papan Sapaan & Materi */}
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-xl border shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div>
                                        <h1 className="text-xl font-bold text-slate-800">Halo, {user?.full_name?.split(' ')[0]}! 👋</h1>
                                        <p className="text-xs text-slate-500 mt-1">Berikut materi untuk pertemuan ini. Silakan pelajari sebelum memulai latihan.</p>
                                    </div>
                                    <button type="button" onClick={() => onStartExams(selectedMeeting)} className="inline-flex justify-center items-center gap-2 bg-pastel-200 text-pastel-800 px-6 py-3 rounded-xl text-xs font-bold uppercase transition-all shadow-sm w-full md:w-auto hover:bg-pastel-300">

                                    </button>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {materials.map(m => (
                                        <div key={m.id} className="bg-white p-6 md:p-8 rounded-xl border border-slate-200 shadow-sm text-left font-sans animate-in flex flex-col h-full">
                                            <div className="flex items-center gap-3 mb-6 font-sans"><div className="w-10 h-10 bg-pastel-50 text-pastel-dark rounded-xl flex items-center justify-center font-sans"><Icon name="BookOpen" size={20}/></div><h4 className="text-lg font-bold text-slate-800 leading-tight font-sans font-sans font-sans font-sans font-sans font-sans">{m.title}</h4></div>
                                            {m.image_url && <div className="mb-6 rounded-lg overflow-hidden border border-slate-100 shadow-sm font-sans font-sans"><img src={m.image_url} className="w-full h-auto max-h-80 object-cover" /></div>}
                                            {m.audio_url && (
                                                <div className="mb-6 p-4 bg-sky-50 rounded-lg flex items-center gap-3 border border-sky-100 font-sans">
                                                    <Icon name="Volume2" className="text-sky-600 font-sans font-sans font-sans font-sans" size={18} />
                                                    <div className="flex-1 font-sans"><audio key={m.audio_url} controls className="custom-audio w-full"><source src={m.audio_url} type="audio/mpeg" /></audio></div>
                                                </div>
                                            )}
                                            <div className="prose prose-blue max-w-none text-slate-600 text-xs mb-8 font-sans flex-1" dangerouslySetInnerHTML={{ __html: m.description }}></div>
                                        </div>
                                    ))}
                                    {materials.length === 0 && !loading && (
                                        <div className="lg:col-span-2 p-20 text-center bg-white border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold italic shadow-inner">
                                            Materi pengajaran belum tersedia untuk pertemuan ini.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeSubTab === 'laporan' && (
                        <div className="bg-white p-6 rounded-xl border shadow-sm animate-in">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-slate-100 pb-4 gap-4">
                                <h3 className="text-xs font-black uppercase tracking-[0.2em] text-slate-500">Laporan Riwayat Pertemuan</h3>
                                <div className="text-[10px] font-bold text-slate-400 uppercase bg-slate-50 px-3 py-1.5 rounded-md border">Total Pertemuan Diselesaikan: {(stats.progress / 100) * 16} / 16</div>
                            </div>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                {meetingResults.map((res) => (
                                    <div key={res.num} className={`p-4 rounded-xl border transition-all ${res.score !== null ? 'bg-white border-pastel-200 shadow-sm hover:border-pastel-300' : 'bg-slate-50 border-slate-100 opacity-60'}`}>
                                        <div className="flex justify-between items-center mb-2">
                                            <h4 className="font-black text-slate-700 text-sm">P-{res.num}</h4>
                                            {res.score !== null && <span className="px-2 py-0.5 bg-green-50 text-green-600 rounded text-[9px] font-black uppercase flex items-center gap-1"><Icon name="CheckCircle" size={10} /> Selesai</span>}
                                        </div>
                                        <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-3">{res.skill}</p>
                                        <div className="mb-3">
                                            <p className="text-[10px] text-slate-400 font-medium">{res.isManualGrade ? "Skor Ujian Riil" : "Akurasi Latihan"}</p>
                                            <p className="text-3xl font-black text-pastel-700 leading-none">{res.score !== null ? `${res.score}${res.isManualGrade ? '' : '%'}` : '--'}</p>
                                        </div>
                                        {res.score !== null && !res.isManualGrade && (
                                            <div className="mt-3 text-[9px] text-red-500 font-bold border-t pt-2 border-slate-100 flex items-start gap-1">
                                                <Icon name="AlertTriangle" size={12} className="shrink-0 mt-0.5 text-red-400" />
                                                <span className="leading-tight capitalize">{res.error}</span>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [questions, setQuestions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [practiceMeeting, setPracticeMeeting] = useState(1);

            const checkUser = useCallback(async () => {
                try { 
                    const { data: { session }, error } = await supabaseClient.auth.getSession(); 
                    if (error) {
                        console.warn("Session check failed", error);
                        setUser(null);
                        return;
                    }
                    if (session) { 
                        const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle(); 
                        if (data) setUser({ ...session.user, ...data }); 
                    } else {
                        setUser(null);
                    }
                } catch(e) {
                    console.warn(e);
                } finally { 
                    setLoading(false); 
                }
            }, []);

            const fetchQuestions = useCallback(async () => {
                if (!user) return;
                try {
                    const { data, error } = await supabaseClient.from('questions').select('*').order('order_index', { ascending: true }); 
                    if (error) throw error;
                    setQuestions(data || []);
                } catch(e) {
                    console.warn("Failed to fetch questions", e);
                }
            }, [user]);

            useEffect(() => { 
                checkUser(); 
                
                // Tambahkan listener untuk refresh otomatis jika token berubah/expired
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_OUT' || !session) {
                        setUser(null);
                    } else if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
                        checkUser();
                    }
                });

                return () => subscription.unsubscribe();
            }, [checkUser]);
            
            useEffect(() => { fetchQuestions(); }, [fetchQuestions]);

            // Fungsi untuk Memfilter dan Mengelompokkan Soal sebelum dilempar ke PracticeEngine
            const sortedPracticeQuestions = useMemo(() => {
                const filtered = questions.filter(q => q.meeting_number === practiceMeeting);
                const skillWeight = { listening: 1, structure: 2, reading: 3 };
                
                return filtered.sort((a, b) => {
                    const weightDiff = (skillWeight[a.skill] || 99) - (skillWeight[b.skill] || 99);
                    if (weightDiff !== 0) return weightDiff;
                    return (a.order_index || 0) - (b.order_index || 0);
                });
            }, [questions, practiceMeeting]);

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-white font-sans text-slate-300 font-bold uppercase tracking-widest animate-pulse font-sans">SINKRONISASI DATA...</div>;
            if (!user) return <AuthPage onAuthSuccess={(u) => { if(u) setUser(u); else checkUser(); }} />;

            return (
                <div className="min-h-screen bg-[#f8fafc] flex flex-col font-sans text-slate-700 font-sans">
                    <nav className="bg-white border-b border-slate-100 sticky top-0 z-50 px-6 h-14 flex items-center shadow-sm font-sans font-sans">
                        <div className="max-w-6xl mx-auto flex justify-between items-center w-full font-sans">
                            <div className="flex items-center gap-2 font-black text-pastel-700 text-lg uppercase tracking-tighter cursor-pointer font-sans" onClick={() => setActiveTab('dashboard')}><Icon name="BookOpen" size={24} /><span>TOEFL</span></div>
                            <div className="flex items-center gap-2 font-sans font-sans font-sans font-sans">
                                <button type="button" onClick={() => setActiveTab('dashboard')} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all font-sans font-sans font-sans font-sans font-sans font-sans ${activeTab === 'dashboard' ? 'bg-pastel-50 text-pastel-700 shadow-inner font-sans font-sans' : 'text-slate-400 font-sans font-sans'}`}>BERANDA</button>
                                <button type="button" onClick={async () => { await supabaseClient.auth.signOut(); setUser(null); }} className="p-2 text-slate-300 hover:text-red-500 rounded-lg transition-all font-sans font-sans font-sans font-sans font-sans font-sans font-sans font-sans font-sans font-sans font-sans font-sans"><Icon name="LogOut" size={18} /></button>
                            </div>
                        </div>
                    </nav>
                    <main className="flex-1 max-w-6xl mx-auto w-full p-4 md:py-8 font-sans font-sans font-sans font-sans font-sans font-sans">
                        {activeTab === 'dashboard' && (user.role === 'lecturer' ? <LecturerDashboard questions={questions} onRefresh={checkUser} onRefreshQuestions={fetchQuestions} /> : <StudentDashboard user={user} questions={questions} onStartExams={(m) => { setPracticeMeeting(m); setActiveTab('practice'); }} />)}
                        {activeTab === 'practice' && <PracticeEngine questions={sortedPracticeQuestions} user={user} onFinish={() => setActiveTab('dashboard')} />}
                    </main>
                    <footer className="py-10 border-t border-slate-50 text-center text-[10px] text-slate-300 font-bold uppercase tracking-widest bg-white font-sans font-sans font-sans font-sans font-sans font-sans font-sans font-sans font-sans font-sans font-sans">ENGINEERING FACULTY LMS &copy; 2026</footer>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
